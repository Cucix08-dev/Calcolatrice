<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark" id="background">
    <div id="container-mode">
        <div id="mode" class="dark">Dark</div>
    </div>
    <div id="container-calcolatrice" class="dark">
        <div id="container-risultato" class="dark">
            <input type="text" id="risultato" class="dark" placeholder="0" readonly>
        </div>
        <div id="container-tasti">
            <div class="button operazione dark" id="cos">cos(x)</div>
            <div class="button operazione dark" id="sin">sin(x)</div>
            <div class="button operazione dark" id="tan">tan(x)</div>
            <div class="button operazione dark" id="cot">cot(x)</div>
            <div class="button operazione dark" id="sec">sec(x)</div>

            <div class="button dark" id="AC">AC</div>
            <div class="button dark" id="pi">π</div>
            <div class="button dark" id="e">e</div>
            <div class="button dark" id="C">
                <svg class="dark" viewBox="0 0 48 48" fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

                    <!-- Corpo a forma di freccia -->
                    <path d="M20 12 L8 24 L20 36 H40 V12 H20 Z" />

                    <!-- X interna  -->
                    <line x1="26" y1="20" x2="34" y2="28" />
                    <line x1="34" y1="20" x2="26" y2="28" />

                </svg>
        </div>
            <div class="button operazione segno dark" id="/">/</div>

            <div class="button operazione dark" id="potenza">x^y</div>
            <div class="button number dark" id="9">9</div>
            <div class="button number dark" id="8">8</div>
            <div class="button number dark" id="7">7</div>
            <div class="button operazione segno dark" id="*">*</div>

            <div class="button operazione dark" id="potenza^2">x^2</div>
            <div class="button number dark" id="6">6</div>
            <div class="button number dark" id="5">5</div>
            <div class="button number dark" id="4">4</div>
            <div class="button operazione segno dark" id="-">-</div>

            <div class="button operazione dark" id="sqrt">sqrt(x)</div>
            <div class="button number dark" id="3">3</div>
            <div class="button number dark" id="2">2</div>
            <div class="button number dark" id="1">1</div>
            <div class="button operazione segno dark" id="+">+</div>

            <div class="button operazione dark" id="log">log(x)</div>
            <div class="button operazione dark" id="negate">+/-</div>
            <div class="button number dark" id="0">0</div>
            <div class="button operazione dark" id=",">,</div>
            <div class="button operazione segno dark" id="=">=</div>
        </div>
    </div>
    <script src="calcolatrice.js"></script>
</body>
</html>
